<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>layout-lint forms demo</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b1020; color: #e5e7eb; }
    .card { width: min(700px, 92vw); border: 1px solid #374151; border-radius: 14px; padding: 20px; background: #111827; }
    a { color: #a5b4fc; text-decoration: none; font-weight: 700; }
    #demo-exit {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 20;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid rgba(122, 129, 255, 0.58);
      background: rgba(122, 129, 255, 0.24);
      color: #eceeff;
      font-size: 10px;
      font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 700;
      transition: background-color 140ms ease, color 140ms ease, border-color 140ms ease;
      backdrop-filter: blur(2px);
    }
    #demo-exit:hover,
    #demo-exit:focus-visible {
      background: rgba(122, 129, 255, 0.36);
      border-color: rgba(122, 129, 255, 0.78);
      color: #f7f8ff;
      outline: none;
    }
  </style>
</head>
<body>
  <a id="demo-exit" href="../index.html" aria-label="Exit to playground">EXIT DEMO</a>
  <main class="card">
    <h1>forms demo</h1>
    <p>Stage content is intentionally minimal right now.</p>
  </main>
</body>
</html>
