<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>layout-lint diagnostic preview</title>
  <meta name="color-scheme" content="light dark" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    p.intro { color: #666; margin-top: 0; }
    textarea {
      width: 100%;
      min-height: 8rem;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95rem;
      padding: 0.6rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    label.toggle {
      margin-left: 0.75rem;
      font-size: 0.9rem;
    }
    pre#output {
      background: #111;
      color: #eee;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.9rem;
      white-space: pre;
      min-height: 6rem;
    }
    .presets button {
      margin-right: 0.4rem;
      margin-top: 0.4rem;
      font-size: 0.8rem;
    }
    .presets { margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <h1>Diagnostic preview</h1>
  <p class="intro">
    Smoke test for the formatted diagnostic output. Edit the spec and press
    <kbd>Lint</kbd> or <kbd>Ctrl/Cmd+Enter</kbd> to render diagnostics through
    <code>formatDiagnostic</code>.
  </p>

  <div class="presets">
    <strong>Presets:</strong>
    <button data-preset="typo">typo (LL-PARSE-SYNTAX)</button>
    <button data-preset="missing">missing token (LL-PARSE-MISSING)</button>
    <button data-preset="malformed">malformed rule (LL-RULE-MALFORMED)</button>
    <button data-preset="unknown-group">unknown group (LL-SEMANTIC-UNKNOWN-GROUP)</button>
    <button data-preset="clean">clean spec (no diagnostics)</button>
  </div>

  <textarea id="spec" spellcheck="false">nav abav header 10px</textarea>
  <div>
    <button id="lint">Lint</button>
    <label class="toggle"><input type="checkbox" id="explain" /> include explain block</label>
  </div>

  <h2 style="font-size:1rem;margin-top:1.4rem;">Output</h2>
  <pre id="output">(press Lint)</pre>

  <script type="module">
    import { getParser } from "../../dist/core/parser.js";
    import { extractRules } from "../../dist/core/dsl.js";
    import { formatDiagnostic } from "../../dist/core/diagnostic-format.js";

    const wasmUrl = "../../layout_lint.wasm";
    const locateFile = () => "../tree-sitter.wasm";

    const specEl = document.getElementById("spec");
    const outputEl = document.getElementById("output");
    const lintBtn = document.getElementById("lint");
    const explainEl = document.getElementById("explain");

    const presets = {
      typo: "nav abav header 10px",
      missing: "nav above",
      malformed: "?garbage",
      "unknown-group": "@cards above header 10px",
      clean: "nav above header 10px",
    };

    document.querySelectorAll(".presets button").forEach((btn) => {
      btn.addEventListener("click", () => {
        specEl.value = presets[btn.dataset.preset];
        lint();
      });
    });

    async function lint() {
      const source = specEl.value;
      outputEl.textContent = "(parsing...)";
      try {
        const parser = await getParser(wasmUrl, locateFile);
        const tree = parser.parse(source);
        const { diagnostics } = extractRules(tree, source);
        if (!diagnostics.length) {
          outputEl.textContent = "(no diagnostics)";
          return;
        }
        outputEl.textContent = diagnostics
          .map((d) => formatDiagnostic(d, source, {
            color: false,
            includeExplain: explainEl.checked,
          }))
          .join("\n\n");
      } catch (err) {
        outputEl.textContent = "error: " + (err?.message ?? String(err));
      }
    }

    lintBtn.addEventListener("click", lint);
    specEl.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        lint();
      }
    });

    lint();
  </script>
</body>
</html>
