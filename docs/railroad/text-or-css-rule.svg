<svg class="railroad-diagram" width="741" style="max-height: 109px;" viewBox="0 0 741 109">
<style>
:root {
    --subtleText: #777;
    --highlightText: hotpink;
    --itemHeadingBackground: #eee;
    --background: white;
    --borderColor: #ccc;
    --textColor: #111;

    --diagramBackground: #f8f8f8;
    --diagramLines: black;
    --diagramText: black;
    --terminalLines: black;
    --terminalFill: #feffdf;
    --nonTerminalLines: black;
    --nonTerminalFill: #feffdf;
    --specialSequenceLines: black;
    --specialSequenceFill: #ffe79a;

    --ebnfCodeBackground: #e8e8e8;
    --ebnfIdentifier: #ef5a5a;
    --ebnfTerminal: #ffa952;
    --ebnfBaseColor: #777;
}
svg.railroad-diagram{background:var(--diagramBackground)}
svg.railroad-diagram {
  width: 100%;
}
svg.railroad-diagram path {
  stroke-width: 3;
  stroke: var(--diagramLines);
  fill: rgba(0,0,0,0);
}
svg.railroad-diagram text {
  font: bold 14px monospace;
  text-anchor: middle;
  fill: var(--diagramText);
}
svg.railroad-diagram text.diagram-text {
  font-size: 12px;
}
svg.railroad-diagram text.diagram-arrow {
  font-size: 16px;
}
svg.railroad-diagram text.label {
  text-anchor: start;
}
svg.railroad-diagram text.comment {
  font: italic 12px monospace;
}
svg.railroad-diagram g.non-terminal text {
  /*font-style: italic;*/
}
svg.railroad-diagram g.special-sequence rect {
  fill: var(--specialSequenceFill);
  stroke: var(--specialSequenceLines);
}
svg.railroad-diagram g.special-sequence text {
  font-style: italic;
}
svg.railroad-diagram rect {
  stroke-width: 3;
}
svg.railroad-diagram rect.group-box {
  stroke: gray;
  stroke-dasharray: 10 5;
  fill: none;
}
svg.railroad-diagram g.non-terminal rect {
  fill: var(--nonTerminalFill);
  stroke: var(--nonTerminalLines);
}
svg.railroad-diagram g.terminal rect {
  fill: var(--terminalFill);
  stroke: var(--terminalLines);
}
svg.railroad-diagram path.diagram-text {
  stroke-width: 3;
  stroke: black;
  fill: white;
  cursor: help;
}
svg.railroad-diagram g.diagram-text:hover path.diagram-text {
  fill: #eee;
}

</style>
